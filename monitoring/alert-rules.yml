groups:
  - name: flask-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(app_errors_total[1m]) > 0.1
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "🔴 High error rate detected"
          description: "🚨 Flask app is returning errors at high rate. Trigger AI RCA: http://localhost:8000/rca"

      - alert: AppDown
        expr: up{job="flask-app"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "💀 Flask app is down"
          description: "❌ Flask app has stopped responding to Prometheus scrapes"